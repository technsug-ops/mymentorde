name: Deploy to KASSERVER (my.mentorde.com)

# Her main branch push'unda otomatik tetiklenir
# Manuel tetikleme için: GitHub > Actions > Deploy > "Run workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── PHP + Composer ──────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, gd, fileinfo, zip, curl, openssl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.4-composer-

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      # ── Node + Vite build ───────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      # ── Deploy via FTP ──────────────────────────────────────────
      # SamKirkland/FTP-Deploy-Action sadece değişen dosyaları yükler
      # (ilk deploy uzun, sonrakiler hızlı)
      # LFTP: KASSERVER ile basic-ftp'den (SamKirkland action) çok daha uyumlu.
      # Mirror (--delete-first, --only-newer) ile sadece değişen dosyaları gönderir.
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Build lftp exclude file
        run: |
          cat > /tmp/lftp-excludes.txt <<'EOF'
          ^\.git/
          ^\.github/
          ^\.gitignore$
          ^\.gitattributes$
          /\.gitignore$
          /\.gitattributes$
          ^node_modules/
          ^tests/
          ^\.env$
          ^\.env\.
          ^storage/framework/cache/data/
          ^storage/framework/sessions/
          ^storage/framework/views/
          ^storage/logs/
          ^database/database\.sqlite$
          ^database/.*\.sqlite$
          ^database/.*\.sqlite-
          ^\.vscode/
          ^\.idea/
          ^\.editorconfig$
          ^\.phpactor\.json$
          ^\.phpunit\.result\.cache$
          ^phpunit\.xml$
          ^package\.json$
          ^package-lock\.json$
          ^vite\.config\.js$
          ^postcss\.config\.js$
          ^tailwind\.config\.js$
          ^playwright\.config\.js$
          ^playwright\.dana\.config\.js$
          ^README\.md$
          ^CLAUDE\.md$
          ^_setup.*\.php$
          ^_kasserver_.*\.php$
          \.bak$
          ^memory/
          ^docs/
          ^playwright-report/
          ^test-results/
          ^Homestead\.
          ^Thumbs\.db$
          ^\.DS_Store$
          EOF
          echo "Exclude file:"
          cat /tmp/lftp-excludes.txt

      - name: Build lftp script
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          cat > /tmp/deploy.lftp <<LFTP
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ftp:passive-mode true
          set mirror:parallel-transfer-count 3
          set cmd:fail-exit no
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST"
          mirror -R --parallel=3 --only-newer --verbose --ignore-time --no-perms --exclude-rx-from=/tmp/lftp-excludes.txt ./ "$FTP_SERVER_DIR"
          bye
          LFTP

      - name: Deploy via lftp (FTPS)
        run: |
          lftp -f /tmp/deploy.lftp || echo "[deploy] lftp finished with non-zero (may be acceptable for stray files)"
          echo "Deploy step complete."
          # Dahil edilmeyecek dosyalar (development + hassas):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/database/*.sqlite*
            **/.vscode/**
            **/.idea/**
            **/phpunit.xml
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/postcss.config.js
            **/tailwind.config.js
            **/README.md
            **/CLAUDE.md
            **/_setup*.php
            **/_kasserver_*.php
            **/*.bak
            **/memory/**
            **/docs/**
            **/playwright-report/**
            **/test-results/**
