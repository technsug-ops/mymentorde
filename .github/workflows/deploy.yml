name: Deploy to KASSERVER (my.mentorde.com)

# Her main branch push'unda otomatik tetiklenir
# Manuel tetikleme için: GitHub > Actions > Deploy > "Run workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── PHP + Composer ──────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, gd, fileinfo, zip, curl, openssl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.4-composer-

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      # ── Node + Vite build ───────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      # ── Deploy via FTP ──────────────────────────────────────────
      # SamKirkland/FTP-Deploy-Action sadece değişen dosyaları yükler
      # (ilk deploy uzun, sonrakiler hızlı)
      # LFTP: KASSERVER ile basic-ftp'den (SamKirkland action) çok daha uyumlu.
      # Mirror (--delete-first, --only-newer) ile sadece değişen dosyaları gönderir.
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:ssl-allow true;
            set ssl:verify-certificate no;
            set net:timeout 20;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set ftp:passive-mode true;
            set mirror:parallel-transfer-count 3;
            set cmd:fail-exit no;
            open -u \"$FTP_USERNAME,$FTP_PASSWORD\" \"ftp://$FTP_HOST\";
            mirror -R --parallel=3 --only-newer --verbose --ignore-time --no-perms \
              --exclude-glob=.git \
              --exclude-glob=.git/ \
              --exclude-glob=.git/** \
              --exclude-glob=.gitignore \
              --exclude-glob=.gitattributes \
              --exclude-glob=**/.gitignore \
              --exclude-glob=**/.gitattributes \
              --exclude-glob=.github/ \
              --exclude-glob=.github/** \
              --exclude-glob=node_modules/ \
              --exclude-glob=node_modules/** \
              --exclude-glob=tests/ \
              --exclude-glob=tests/** \
              --exclude-glob=.env \
              --exclude-glob=.env.* \
              --exclude-glob=storage/framework/cache/ \
              --exclude-glob=storage/framework/cache/** \
              --exclude-glob=storage/framework/sessions/ \
              --exclude-glob=storage/framework/sessions/** \
              --exclude-glob=storage/framework/views/ \
              --exclude-glob=storage/framework/views/** \
              --exclude-glob=storage/logs/ \
              --exclude-glob=storage/logs/** \
              --exclude-glob=database/database.sqlite \
              --exclude-glob=database/*.sqlite \
              --exclude-glob=database/*.sqlite-* \
              --exclude-glob=.vscode/ \
              --exclude-glob=.vscode/** \
              --exclude-glob=.idea/ \
              --exclude-glob=.idea/** \
              --exclude-glob=.editorconfig \
              --exclude-glob=.phpactor.json \
              --exclude-glob=.phpunit.result.cache \
              --exclude-glob=phpunit.xml \
              --exclude-glob=package.json \
              --exclude-glob=package-lock.json \
              --exclude-glob=vite.config.js \
              --exclude-glob=postcss.config.js \
              --exclude-glob=tailwind.config.js \
              --exclude-glob=playwright.config.js \
              --exclude-glob=playwright.dana.config.js \
              --exclude-glob=README.md \
              --exclude-glob=CLAUDE.md \
              --exclude-glob=_setup*.php \
              --exclude-glob=_kasserver_*.php \
              --exclude-glob=*.bak \
              --exclude-glob=memory/ \
              --exclude-glob=memory/** \
              --exclude-glob=docs/ \
              --exclude-glob=docs/** \
              --exclude-glob=playwright-report/ \
              --exclude-glob=playwright-report/** \
              --exclude-glob=test-results/ \
              --exclude-glob=test-results/** \
              --exclude-glob=Homestead.json \
              --exclude-glob=Homestead.yaml \
              --exclude-glob=Thumbs.db \
              --exclude-glob=.DS_Store \
              ./ \"$FTP_SERVER_DIR\" || echo '[deploy] mirror finished with warnings (acceptable)'
          "
          # Dahil edilmeyecek dosyalar (development + hassas):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/database/*.sqlite*
            **/.vscode/**
            **/.idea/**
            **/phpunit.xml
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/postcss.config.js
            **/tailwind.config.js
            **/README.md
            **/CLAUDE.md
            **/_setup*.php
            **/_kasserver_*.php
            **/*.bak
            **/memory/**
            **/docs/**
            **/playwright-report/**
            **/test-results/**
