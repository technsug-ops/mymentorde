# MentorDE — Nginx Production Yapılandırması
# Kullanım:
#   sudo cp scripts/nginx-mentorde.conf /etc/nginx/sites-available/mentorde
#   sudo ln -s /etc/nginx/sites-available/mentorde /etc/nginx/sites-enabled/mentorde
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL eklemek için:
#   sudo certbot --nginx -d mentorde.yourdomain.com

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name mentorde.yourdomain.com;

    # Certbot challenge için
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS ana sunucu
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mentorde.yourdomain.com;

    root /var/www/mentorde/public;
    index index.php;

    # SSL sertifikalar (Certbot otomatik günceller)
    ssl_certificate     /etc/letsencrypt/live/mentorde.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mentorde.yourdomain.com/privkey.pem;

    # Modern SSL ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Güvenlik başlıkları (Laravel SecurityHeaders middleware ile örtüşür)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Upload boyut limiti (belge yüklemeleri için)
    client_max_body_size 20M;

    # Log dosyaları
    access_log /var/log/nginx/mentorde-access.log;
    error_log  /var/log/nginx/mentorde-error.log;

    # Laravel URL rewrite
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Statik dosyalar — cache başlıkları
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Storage (public disk uploads)
    location /storage/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Gizli dosyaları engelle
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # .env ve hassas dosyalara erişimi engelle
    location ~* \.(env|log|sql|sh|conf|lock)$ {
        deny all;
        return 404;
    }

    # storage ve bootstrap/cache web'den erişilemez
    location ~ ^/(storage/app|bootstrap/cache) {
        deny all;
        return 404;
    }
}
